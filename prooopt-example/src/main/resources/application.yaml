# PrOOPt configuration for the LegalAnalyzer example.
#
# The loader resolves ${ENV_VAR} placeholders from environment variables and
# then system properties (-DANTHOPIC_API_KEY=...). Never put literal API keys here.
#
# To run with a real Anthropic model, export the key and swap MockModelRouter
# for CloudModelRouter + AnthropicAdapter in LegalAnalyzerDemo.java.

prooopt:

  # ── Model tiers ───────────────────────────────────────────────────────────────

  models:

    # LOCAL — on-device inference via JLama; nothing leaves the JVM.
    local:
      engine: jlama
      # modelPath is the directory where the quantised GGUF model was downloaded.
      # Swap for any JLama-compatible model, e.g. a Llama-3-8B Q4 GGUF.
      modelPath: ${JLAMA_MODEL_PATH:models/llama3-8b-q4}
      thinking: false
      maxTokens: 512
      temperature: 0.3
      timeoutMs: 60000

    # CLOUD_FAST — cheap cloud tier; used for discovery and light fact-extraction.
    cloud-fast:
      engine: anthropic
      modelId: claude-haiku-4-5
      apiKey: ${ANTHROPIC_API_KEY}
      maxTokens: 1024
      temperature: 0.5
      timeoutMs: 15000

    # CLOUD_ADVANCED — flagship cloud tier; reserved for final summarisation.
    cloud-advanced:
      engine: anthropic
      modelId: claude-opus-4-8
      apiKey: ${ANTHROPIC_API_KEY}
      maxTokens: 2048
      temperature: 0.7
      timeoutMs: 30000

    # AUTO — the router picks LOCAL for short requests, CLOUD_FAST above the threshold.
    auto:
      strategy: complexity-heuristic
      tokenThreshold: 500
      fallback: CLOUD_FAST

  # ── Tool selection (semantic matching before the orchestrator sees tools) ─────

  tool-selection:
    strategy: semantic
    top-k: 10
    min-similarity: 0.30
    embedding-engine: tfidf   # "tfidf" (zero-dep) or "local-model" (JLama dense vectors)

  # ── Orchestration (two-phase discovery → planning → execution) ───────────────

  orchestration:
    strategy: two-phase
    discovery-model: LOCAL          # cheap phase-1 discovery
    execution-model: AUTO           # phase-3 planning; AUTO escalates if needed
    min-match-score: 0.40           # minimum cosine score to bind a capability to a tool
    max-tools: 15                   # hard cap on tools handed to the planner
