##
## Publish: build, sign, and deploy to Maven Central.
##
## Triggered on push to:
##   release/**                — stable releases (e.g. release/0.1.0, release/1.0.0)
##   pilot-implementation/**   — pre-release / candidate builds (e.g. pilot-implementation/0.2.0-RC1)
##
## Required repository secrets:
##   CENTRAL_USERNAME    — Maven Central Portal token username
##                         (Sonatype Central → Account → Generate User Token → Username)
##   CENTRAL_PASSWORD    — Maven Central Portal token password
##   GPG_PRIVATE_KEY     — Armored private key:
##                           gpg --armor --export-secret-keys <KEY_ID>
##   GPG_PASSPHRASE      — Passphrase protecting the private key
##
## Versioning:
##   The patch component is incremented automatically on every publish run.
##   The bumped pom.xml files are committed back to the branch with [skip ci]
##   so the next push always publishes a fresh version number.
##   Maven Central does NOT accept SNAPSHOT versions; the base version in pom.xml
##   must be a plain release qualifier (e.g. 0.1.1, 1.0.0).
##
name: Publish to Maven Central

on:
  push:
    branches:
      - 'release/**'
      - 'pilot-implementation/**'

permissions:
  contents: write   # needed to push the version-bump commit back to the branch

jobs:
  publish:
    name: Publish (Java 17)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # setup-java creates ~/.m2/settings.xml with a <server id="central"> entry
      # whose username/password are taken from the env vars below.
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven
          server-id: central
          server-username: CENTRAL_USERNAME
          server-password: CENTRAL_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: GPG_PASSPHRASE

      # Read the current version, increment the patch number, and rewrite all
      # pom.xml files in the reactor.  The new version is exposed as an output
      # so subsequent steps can reference it in log messages.
      - name: Bump patch version
        id: version
        run: |
          CURRENT=$(mvn help:evaluate -Dexpression=project.version \
                        -q -DforceStdout --no-transfer-progress)
          # Split into major.minor.patch — handles plain x.y.z only.
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          NEW_PATCH=$(( PATCH + 1 ))
          NEW_VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}"
          echo "Bumping ${CURRENT} → ${NEW_VERSION}"
          mvn --no-transfer-progress --batch-mode \
              versions:set -DnewVersion="${NEW_VERSION}" \
              versions:commit
          echo "old_version=${CURRENT}"  >> "$GITHUB_OUTPUT"
          echo "new_version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Publish ${{ steps.version.outputs.new_version }} from ${{ github.ref_name }}
        env:
          CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          CENTRAL_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        # -P release activates the release profile defined in the parent POM:
        #   maven-source-plugin  → attaches *-sources.jar
        #   maven-javadoc-plugin → attaches *-javadoc.jar
        #   maven-gpg-plugin     → signs all artifacts with .asc files
        #   central-publishing-maven-plugin → uploads bundle to Central Portal and waits for validation
        run: |
          mvn --no-transfer-progress --batch-mode \
              -P release \
              deploy

      # Commit the bumped pom.xml files back to the branch so the next push
      # always starts from a fresh base version.  [skip ci] prevents this
      # commit from triggering another workflow run.
      - name: Commit version bump
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: bump version ${{ steps.version.outputs.old_version }} → ${{ steps.version.outputs.new_version }} [skip ci]"
          git push
